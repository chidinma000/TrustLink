name: CI

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  ci:
    name: Build and Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        run: rustup show

      - name: Cache cargo registry and build artifacts
        uses: Swatinem/rust-cache@v2

      - name: Check lib
        run: cargo check --lib

      - name: Run tests
        run: cargo test

      - name: Build WASM
        run: cargo build --target wasm32-unknown-unknown --release

      - name: Install cargo-llvm-cov
        run: cargo install cargo-llvm-cov

      - name: Generate coverage report
        run: cargo llvm-cov --lcov --output-path lcov.info

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v3
        with:
          files: ./lcov.info
          fail_ci_if_error: true

  bindings:
    name: TypeScript Bindings
    runs-on: ubuntu-latest
    needs: ci
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        run: rustup show

      - name: Cache cargo registry and build artifacts
        uses: Swatinem/rust-cache@v2

      - name: Install Stellar CLI
        run: cargo install --locked stellar-cli --features opt

      - name: Build WASM
        run: cargo build --target wasm32-unknown-unknown --release

      - name: Generate TypeScript bindings
        run: make bindings

      - name: Fail if bindings are out of date
        run: |
          git diff --exit-code bindings/typescript/ || (
            echo "TypeScript bindings are out of date."
            echo "Run 'make bindings' locally and commit the updated bindings/typescript/ directory."
            exit 1
          )
